# Временный конфиг для получения сертификата
server {
    listen 80;
    server_name mrk.digital;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "Temporary HTTP mode for SSL renewal";
    }
}

server {
    listen 80;
    server_name audit.mrk.digital;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "Temporary HTTP mode for SSL renewal";
    }
}